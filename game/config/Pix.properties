# ID do item vendido — o valor efetivo e PurchasableItem em donation.properties
# (4037 = Coin of Luck; tem que existir no ItemData)
PurchasableItems = 4037-1
# Deletar compras expiradas automaticamente
DeleteExpiredPurchases = False

# Permitir que os players ocultem compras concluidas (pagas)
# Nada sera deletado do banco de dados, apenas nao estara mais visivel para o player no seu historico
HideCompletedPurchases = True

# =================================================================
#                          Flood Protectors PIX
# =================================================================
# Tempo minimo entre solicitasoes de compra e checagem no Mercado Pago. Valores em ms (1s x 1000).
PayTime = 5
CheckTime = 10