# =================================================================
#                          PIX Manager
# =================================================================
# Ligar mod PIX / DonationManager. O valor final também depende de donation.properties (EnableDonationManager).
EnablePixMod = False

# Utilize "//reload config" para recarregar os valores no gameserver

# API
# https://www.mercadopago.com.br/developers/panel/app
#MercadoPagoApiToken = APP_USR-2051013733669777-******-************************-*********
MercadoPagoApiToken = APP_USR-8348661493928939-122014-*********************-***********
# Prazo maximo em minutos para o pagamento do pix
MercadoPagoExpirationTime = 30

# Dominios permitidos para serem utilizados como e-mail
