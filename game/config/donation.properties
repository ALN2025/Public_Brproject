# =================================================================
#                          Donation Manager
# =================================================================
# https://www.l2jbrasil.com/topic/147884-sistema-de-pagamento-via-pix-qrcode-dentro-do-jogo
# Utilize "//reload config" para recarregar os valores no gameserver
# Alguns valores podem não serem alterados mesmo assim, reinicie para ter certeza

# Ativa ou desativa o DonationManager / integração Mercado Pago (.pix / bypass pix).
# IMPORTANTE: este ficheiro é lido DEPOIS de custom/Pix.properties — se aqui for False,
# o comando .pix fica desligado mesmo com EnablePixMod=True no Pix.properties.
EnableDonationManager = True

# ID do item a ser vendido
# O preço deverá ser especificado individualmente em cada método de pagamento
# Item que o player recebe ao pagar (tem que existir em data/xml/items/)
# 4037 = Coin of Luck (moeda donate do BrProject). 9511 nao existe no pack — desativa o mod.
PurchasableItem = 4037

# Deletar do banco de dados compras expiradas, com falhas ou canceladas (pelo player) automaticamente
# Compras com o pagamento feito nunca serão deletadas
DeleteInactivePurchases = False

# Deletar do banco de dados informações adicionais de pagamento (IDs secundários, qrcode, links) de compras concluídas
# Esses valores são utilizados somente enquanto a compra está com pagamento pendente. Depois disso, eles não tem mais utilidade para o sistema
DeletePaymentData = True

# Permitir que os players ocultem (compras pagas) ou deletem compras (expiradas, com falhas, etc)
# As configs acima irão definir se os registros serão ou não deletados do banco de dados
HideEndedPurchases = True

# Deletar TODAS as compras de um player se ele (o character) for deletado
DeleteOnCharDelete = False

# Nome do seu servidor
# Utilizado pelos métodos de pagamento via link
ServerName = L2J

# Exibir link para à calculadora
# É apenas uma ferramenta do cliente, o player pode usar pra fazer alguma conta
Calculator = True

# Exibir lista com quantidade pré-definida ao invés de um campo para o player digitar a quantidade que deseja comprar
# Caso ative, defina as quantidades em cada serviço de pagamento
ShowDropdown = True

# Exigir que os player concordem com os termos especificados no arquivo terms.htm
# Caso contrário não será possível comprar nada
RequireTerms = True

# Domínios permitidos para serem utilizados como e-mail
# O mercado pago não gosta que endereços aleatórios sejam enviados, então para evitar que os players abusem disso, restringimos as possibilidades
AllowedEmailAddresses = gmail.com,gmail.com.br,outlook.com,outlook.com.br,hotmail.com,hotmail.com.br,yahoo.com,yahoo.com.br,icloud.com,aol.com,mail.com,gmx.com,zohomail.com,uol.com.br,bol.com.br,terra.com.br,ig.com.br,proton.me,protonmail.com,mailbox.org,riseup.net

