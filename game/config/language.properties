defaultLocale=en-US
locales=en-US,pt-BR,ru-RU
charset=utf-8

# --- CountryLocaleManager (auto-set language by player IP) ---
# Master switch. When false, onEnterWorld skips the geolocation lookup.
CountryLocaleEnable=true
# Send a chat notification when the player's country is resolved / unmapped.
CountryLocaleNotify=true
# Apply the matched locale via Player.setLocale(...). If false, only notify.
CountryLocaleAutoSet=true
# ip-api.com compatible endpoint returning {"status","country","countryCode"}.
CountryLocaleApiUrl=http://ip-api.com/json/%s?fields=status,country,countryCode
CountryLocaleTimeoutMs=2500
# ISO country code (uppercase) -> Locale.forLanguageTag(tag).
# Add or override freely; unknown countries are ignored.
CountryLocaleMap=BR=pt-BR,US=en-US,RU=ru-RU,PT=pt-BR,GB=en-US,FR=en-US,DE=en-US,ES=en-US,IT=en-US